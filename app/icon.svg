<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#060c06"/>
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#00ff41" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Terminal cursor block -->
  <rect x="5" y="7" width="22" height="3" rx="1" fill="#00ff41" fill-opacity="0.15"/>
